<!DOCTYPE html>
<html>
<head>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

h1 {
    color: white;
    margin-top: 30px;
}

.container {
    background: white;
    width: 520px;
    margin: 30px auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 25px #ff4d88;
    position: relative;
    z-index: 2;
}

button {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 260px;
    border: none;
    border-radius: 10px;
    background-color: #ff4d88;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #ff0066;
    transform: scale(1.05);
}

.nextBtn {
    background-color: #6a5acd;
}

#message {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #ff0066;
}

.question {
    display: none;
}

/* Heart Rain */
.heart {
    position: fixed;
    top: -50px;
    font-size: 24px;
    animation: fall 4s linear infinite;
    z-index: 1;
}

@keyframes fall {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="message"></div>

<script>

function showQuestion(num) {
    let qs = document.getElementsByClassName("question");
    for(let i=0;i<qs.length;i++){
        qs[i].style.display="none";
    }
    document.getElementById("q"+num).style.display="block";
    document.getElementById("message").innerHTML="";
    document.getElementById("nextArea").innerHTML="";
}

function showNext(num){
    document.getElementById("nextArea").innerHTML =
    "<button class='nextBtn' onclick='showQuestion("+num+")'>Next ➜</button>";
}

/* Q1 Funny Logic */
function checkQ1(opt){
    if(opt=='a'){
        document.getElementById("message").innerHTML =
        "😍 Correct answer! I knew it! My heart is safe 💖";
        showNext(2);
    } 
    else if(opt=='b'){
        document.getElementById("message").innerHTML =
        "😒 Brother ah? Then marry him only 😂 Try again!";
    }
    else if(opt=='c'){
        document.getElementById("message").innerHTML =
        "😂 Amma is love... but I am your future love! Select properly!";
    }
    else if(opt=='d'){
        document.getElementById("message").innerHTML =
        "😏 Nanna strong... but I am stronger in your heart!";
    }
}

/* Q2 */
function checkQ2(opt){
    if(opt=='a'){
        document.getElementById("message").innerHTML =
        "🌊 Vizag + Us = Lifetime memories 💕";
        showNext(3);
    } else {
        document.getElementById("message").innerHTML =
        "😒 HYD aa? Nooo choose our love place!";
    }

/* Q3 Funny */
function checkQ3(opt){
    if(opt=='d'){
        document.getElementById("message").innerHTML =
        "😂 Smart boy! You know how to handle me 💖";
        showNext(4);
    } else {
        document.getElementById("message").innerHTML =

/* Q5 Final */
function checkQ5(opt){
    if(opt=='a'){
        document.getElementById("message").innerHTML =
        "💖💖💖 I LOVE YOU SO MUCH SRAVAN 💖💖💖<br><br>You Passed The Love Test 😘";
        startHeartRain();
    } else {
        document.getElementById("message").innerHTML =
        "❌ Invalid Answer! Only YES allowed 😌";
    }
}

/* Heart Rain */
function startHeartRain(){
    for(let i=0;i<40;i++){
        let heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.animationDuration=(Math.random()*2+3)+"s";
        document.body.appendChild(heart);
    }
}

</script>

</body>
</html>
